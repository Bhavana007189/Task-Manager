<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 420px;">

        <h3 class="text-center mb-3">
            <i class="bi bi-pencil-square"></i> Edit Task
        </h3>

        <form method="POST">
            {% csrf_token %}

            <input class="form-control mb-2" name="title" value="{{ task.title }}">

            <textarea class="form-control mb-2" name="description">{{ task.description }}</textarea>

            <input class="form-control mb-2" name="priority" value="{{ task.priority }}">

            <input class="form-control mb-3" type="date" name="deadline" value="{{ task.deadline }}">

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="completed"
                {% if task.completed %}checked{% endif %}>
                <label class="form-check-label">
                    Mark as Completed
                </label>
            </div>

            <button class="btn btn-success w-100">
                <i class="bi bi-save"></i> Update Task
            </button>

        </form>

    </div>

</div>

</body>
</html>
