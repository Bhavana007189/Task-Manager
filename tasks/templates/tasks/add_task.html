<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background:  linear-gradient(to right, #4facfe, #00f2fe);
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }
    </style>
    <style>
body {
    font-family: 'Segoe UI', sans-serif;
}

.btn {
    border-radius: 8px;
}

.card {
    border-radius: 12px;
}

</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 420px;">

        <h3 class="text-center mb-3">
            <i class="bi bi-plus-circle"></i> Add Task
        </h3>

        <form method="POST">
            {% csrf_token %}

            <input class="form-control mb-2" name="title" placeholder="Title">

            <textarea class="form-control mb-2" name="description" placeholder="Description"></textarea>

            <input class="form-control mb-2" name="priority" placeholder="Priority">

            <input class="form-control mb-3" type="date" name="deadline">

            <button class="btn btn-success w-100">
                <i class="bi bi-save"></i> Save Task
            </button>
        </form>

    </div>

</div>

</body>
</html>
